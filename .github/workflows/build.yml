name: Build Extension

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write # needed to attach the zip to a GitHub Release on tags

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version is read from the "packageManager" field in package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Zip extension (Chrome Web Store upload package)
        run: |
          cd dist
          zip -r ../hexpane.zip .
          cd ..

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: hexpane-extension
          path: hexpane.zip
          if-no-files-found: error

      # On a version tag (e.g. v2.1.0), also attach the zip to a GitHub Release.
      - name: Attach zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: hexpane.zip
